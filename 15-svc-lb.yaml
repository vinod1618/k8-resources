apiVersion: v1
kind: Service
metadata: 
  name: nginx-lb
spec:
  type: LoadBalancer
  selector:
  #lables are used as selectors
    project: roboshop
    componsnt:  frontend
    environment: dev
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port
      nodePort: 32087